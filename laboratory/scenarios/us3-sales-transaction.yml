config:
  target: "http://localhost:3000"
  phases:
    - duration: 60
      arrivalRate: 2
      name: Warm up
  processor: "./processor.js"

scenarios:
  - name: "E2E Sales Transaction"
    flow:
      - post:
          url: "/products"
          json:
            name: "Sales Test Product"
            price: 150.00
          capture:
            - json: "$.id"
              as: "productId"
      - post:
          url: "/inventory/adjust"
          json:
            productId: "{{ productId }}"
            delta: 50
      - post:
          url: "/sales"
          json:
            items:
              - productId: "{{ productId }}"
                quantity: 2
          capture:
            - json: "$.id"
              as: "transactionId"
      - get:
          url: "/sales/{{ transactionId }}"
      - get:
          url: "/inventory/{{ productId }}"
