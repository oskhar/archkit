services:
  # Monolith Architecture
  monolith:
    build:
      context: ../../apps/monolith
      dockerfile: Dockerfile
    environment:
      - DB_HOST=mysql-monolith
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_NAME=archkit_monolith
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "3000:3000"
    depends_on:
      mysql-monolith:
        condition: service_healthy
    networks:
      - archkit-network

  # Hybrid Architecture
  api-gateway:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: api-gateway
    environment:
      - PORT=3000
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - INVENTORY_SERVICE_URL=http://inventory-service:3002
      - SALES_SERVICE_URL=http://sales-service:3003
      - KAFKA_BROKERS=redpanda:29092
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - inventory-service
      - sales-service
    networks:
      - archkit-network

  product-service:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: product-service
    environment:
      - PORT=3001
      - DB_HOST=mysql-product
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_DATABASE=archkit_product
      - KAFKA_BROKERS=redpanda:29092
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      mysql-product:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - archkit-network

  inventory-service:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: inventory-service
    environment:
      - PORT=3002
      - DB_HOST=mysql-inventory
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_DATABASE=archkit_inventory
      - KAFKA_BROKERS=redpanda:29092
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      mysql-inventory:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - archkit-network

  sales-service:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: sales-service
    environment:
      - PORT=3003
      - DB_HOST=mysql-sales
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_DATABASE=archkit_sales
      - KAFKA_BROKERS=redpanda:29092
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      mysql-sales:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - archkit-network

networks:
  archkit-network:
    name: archkit-network
    driver: bridge
