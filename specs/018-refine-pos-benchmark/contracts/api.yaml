openapi: 3.0.0
info:
  title: POS Architecture Benchmark API
  version: 1.0.0
paths:
  /products:
    post:
      summary: Create a product
    get:
      summary: List all products
  /inventory/adjust:
    post:
      summary: Adjust inventory stock
  /sales:
    post:
      summary: Record a sale transaction
components:
  schemas:
    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: number }
    Inventory:
      type: object
      properties:
        productId: { type: string }
        stockQuantity: { type: integer }
